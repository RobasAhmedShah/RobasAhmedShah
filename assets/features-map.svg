<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="Blocks feature map">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="45%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title{font:700 30px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#E5E7EB}
      .sub{font:500 14px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#9CA3AF}
      .nodeTitle{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#E5E7EB}
      .nodeMeta{font:500 13px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#9CA3AF}
      .chip{font:600 12px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#D1D5DB}
      .card{fill:#0F172A;stroke:#1F2937;stroke-width:1}
      .card:hover{stroke:#60A5FA;stroke-width:1.2}
      .chipBg{fill:#111827;stroke:#1F2937;stroke-width:1}
      .line{stroke:#243041;stroke-width:2}
      .dot{fill:#60A5FA}
      a{text-decoration:none}
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="520" rx="22" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="6" rx="22" fill="url(#accent)"/>

  <text x="36" y="62" class="title">Blocks · Feature Map</text>
  <text x="36" y="90" class="sub">Clickable nodes jump to sections in this README. Later we can swap links to commits or files.</text>

  <!-- Root node -->
  <circle cx="120" cy="290" r="7" class="dot"/>
  <text x="96" y="265" class="sub">root</text>

  <!-- Connector trunk -->
  <line x1="120" y1="290" x2="260" y2="290" class="line"/>
  <circle cx="260" cy="290" r="5" class="dot"/>

  <!-- Branches -->
  <line x1="260" y1="290" x2="320" y2="150" class="line"/>
  <line x1="260" y1="290" x2="320" y2="240" class="line"/>
  <line x1="260" y1="290" x2="320" y2="330" class="line"/>
  <line x1="260" y1="290" x2="320" y2="420" class="line"/>

  <!-- Left column nodes -->
  <a href="https://example.com/?feature=wallet-connect">
    <g filter="url(#shadow)">
      <rect x="340" y="110" width="360" height="88" rx="16" class="card"/>
      <text x="362" y="148" class="nodeTitle">Wallet connect</text>
      <text x="362" y="170" class="nodeMeta">walletconnect · connection flow</text>
      <rect x="600" y="145" width="82" height="22" rx="11" class="chipBg"/>
      <text x="612" y="161" class="chip">Feature</text>
    </g>
  </a>

  <a href="https://example.com/?feature=onboarding">
    <g filter="url(#shadow)">
      <rect x="340" y="200" width="360" height="88" rx="16" class="card"/>
      <text x="362" y="238" class="nodeTitle">Onboarding</text>
      <text x="362" y="260" class="nodeMeta">forms · animated steps · validation</text>
      <rect x="588" y="235" width="94" height="22" rx="11" class="chipBg"/>
      <text x="600" y="251" class="chip">Flow</text>
    </g>
  </a>

  <a href="https://example.com/?feature=chatbot">
    <g filter="url(#shadow)">
      <rect x="340" y="290" width="360" height="88" rx="16" class="card"/>
      <text x="362" y="328" class="nodeTitle">Chatbot</text>
      <text x="362" y="350" class="nodeMeta">guided help · contextual prompts</text>
      <rect x="588" y="325" width="94" height="22" rx="11" class="chipBg"/>
      <text x="600" y="341" class="chip">UX</text>
    </g>
  </a>

  <a href="https://example.com/?feature=certificate-generation">
    <g filter="url(#shadow)">
      <rect x="340" y="380" width="360" height="88" rx="16" class="card"/>
      <text x="362" y="418" class="nodeTitle">Certificate generation</text>
      <text x="362" y="440" class="nodeMeta">templates · export · verification</text>
      <rect x="588" y="415" width="94" height="22" rx="11" class="chipBg"/>
      <text x="600" y="431" class="chip">Output</text>
    </g>
  </a>

  <!-- Right column nodes -->
  <line x1="700" y1="155" x2="820" y2="155" class="line"/>
  <line x1="700" y1="245" x2="820" y2="245" class="line"/>

  <a href="https://example.com/?feature=fingerprint">
    <g filter="url(#shadow)">
      <rect x="840" y="115" width="320" height="88" rx="16" class="card"/>
      <text x="862" y="153" class="nodeTitle">Fingerprint</text>
      <text x="862" y="175" class="nodeMeta">biometric auth · secure access</text>
      <rect x="1060" y="150" width="82" height="22" rx="11" class="chipBg"/>
      <text x="1072" y="166" class="chip">Auth</text>
    </g>
  </a>

  <a href="https://example.com/?feature=notifications">
    <g filter="url(#shadow)">
      <rect x="840" y="205" width="320" height="88" rx="16" class="card"/>
      <text x="862" y="243" class="nodeTitle">Notifications</text>
      <text x="862" y="265" class="nodeMeta">push · in app alerts · events</text>
      <rect x="1054" y="240" width="88" height="22" rx="11" class="chipBg"/>
      <text x="1066" y="256" class="chip">Events</text>
    </g>
  </a>

  <text x="36" y="500" class="sub">Tip: We can later wire each node to a commit URL or file path once we locate the implementation in your repo.</text>
</svg>
