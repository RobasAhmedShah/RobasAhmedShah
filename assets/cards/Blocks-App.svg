<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="540" height="200" viewBox="0 0 540 200"
     role="img" aria-label="Blocks-App repository card">
  <defs>

    <!-- ── Surface material ── -->
    <linearGradient id="surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#23272F"/>
      <stop offset="100%" stop-color="#181B22"/>
    </linearGradient>

    <!-- Specular sheen: top-left light source -->
    <radialGradient id="sheen" cx="0.25" cy="0" r="0.9">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.055"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Ambient occlusion: darkens all four corners -->
    <radialGradient id="ao" cx="0.5" cy="0.5" r="0.75">
      <stop offset="55%"  stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.32"/>
    </radialGradient>

    <!-- Accent glow pool behind name -->
    <radialGradient id="nameGlow" cx="0" cy="1" r="1">
      <stop offset="0%"   stop-color="#3178C6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3178C6" stop-opacity="0"/>
    </radialGradient>

    <!-- Recessed panel gradient (inset trough for commit area) -->
    <linearGradient id="trough" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0D0F14"/>
      <stop offset="100%" stop-color="#13161D"/>
    </linearGradient>

    <!-- Outer card shadow -->
    <filter id="cardShadow" x="-12%" y="-12%" width="124%" height="134%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.65"/>
      <feDropShadow dx="0" dy="2"  stdDeviation="4"  flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <!-- Soft inner glow for the trough -->
    <filter id="troughGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- LED glow for language dot -->
    <filter id="led" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="3" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="card"><rect width="540" height="200" rx="20"/></clipPath>
  </defs>

  <!-- ── Shadow layer ── -->
  <rect width="540" height="200" rx="20" fill="#181B22" filter="url(#cardShadow)"/>

  <!-- ── Card body ── -->
  <g clip-path="url(#card)">

    <!-- Base surface -->
    <rect width="540" height="200" fill="url(#surface)"/>

    <!-- Specular sheen (light from top-left) -->
    <rect width="540" height="200" fill="url(#sheen)"/>

    <!-- Ambient occlusion vignette -->
    <rect width="540" height="200" fill="url(#ao)"/>

    <!-- Accent glow pool -->
    <rect width="540" height="200" fill="url(#nameGlow)"/>

    <!-- ── Top highlight line (beveled edge illusion) ── -->
    <rect x="1" y="1" width="538" height="1.5" rx="1" fill="#FFFFFF" opacity="0.09"/>

    <!-- ── Left edge highlight ── -->
    <rect x="1" y="1" width="1.5" height="198" rx="1" fill="#FFFFFF" opacity="0.05"/>

    <!-- ── Bottom shadow line ── -->
    <rect x="0" y="198" width="540" height="2" rx="1" fill="#000000" opacity="0.4"/>

    <!-- ══════════════════════════════════════
         SECTION 1 — Header (repo name + desc)
         ══════════════════════════════════════ -->

    <!-- Accent left notch -->
    <rect x="0" y="24" width="3.5" height="36" rx="2" fill="#3178C6"/>
    <!-- Notch soft glow -->
    <rect x="0" y="24" width="18" height="36" fill="#3178C6" opacity="0.07"/>

    <!-- Repo name — embossed effect (shadow layer + main text) -->
    <text x="22" y="48"
          font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Arial"
          font-size="20" font-weight="700" fill="#0D0F14" opacity="0.6"
          transform="translate(0,1)">Blocks-App</text>
    <text x="22" y="48"
          font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Arial"
          font-size="20" font-weight="700" fill="#F3F4F6">Blocks-App</text>

    <!-- Description -->
    <text x="22" y="68"
          font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Arial"
          font-size="12.5" fill="#5C6370" letter-spacing="0.01em">a real state asset tokenization platform - user centric by intelik</text>

    <!-- ══════════════════════════════════════
         SECTION 2 — Recessed commit trough
         ══════════════════════════════════════ -->

    <!-- Trough outer bevel (top shadow) -->
    <rect x="18" y="83" width="504" height="62" rx="10" fill="#000" opacity="0.35"/>

    <!-- Trough body -->
    <rect x="18" y="84" width="504" height="61" rx="9" fill="url(#trough)" stroke="#0A0C10" stroke-width="1"/>

    <!-- Trough inner top highlight (bottom edge of top bevel) -->
    <rect x="20" y="85" width="500" height="1" rx="1" fill="#FFFFFF" opacity="0.04"/>

    <!-- Trough inner bottom light -->
    <rect x="20" y="143" width="500" height="1.5" rx="1" fill="#FFFFFF" opacity="0.03"/>

    <!-- Commit label -->
    <text x="30" y="101"
          font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Arial"
          font-size="10" font-weight="600" fill="#3D4350"
          letter-spacing="0.08em">LAST COMMIT</text>

    <!-- Commit "since" pill -->
    
    <rect x="452.5" y="90" width="57.5" height="15" rx="7.5"
          fill="#3178C633" stroke="#3178C6" stroke-width="0.75" stroke-opacity="0.5"/>
    <text x="481.25" y="101"
          font-family="ui-monospace,'Cascadia Code','Fira Code',Consolas,monospace"
          font-size="10" fill="#3178C6" text-anchor="middle">28d ago</text>
    

    <!-- Divider inside trough -->
    <rect x="28" y="108" width="484" height="0.75" fill="#1E2128"/>

    <!-- Commit message -->
    <text x="30" y="130"
          font-family="ui-monospace,'Cascadia Code','Fira Code',Consolas,monospace"
          font-size="13" fill="#8B95A6">Update app version to 1.1.36, change user interface style t…</text>

    <!-- ══════════════════════════════════════
         SECTION 3 — Footer stats row
         ══════════════════════════════════════ -->

    <!-- Language LED dot -->
    <circle cx="24" cy="169" r="4.5" fill="#3178C6" opacity="0.9" filter="url(#led)"/>
    <circle cx="24" cy="169" r="2"   fill="#fff" opacity="0.5"/>

    <text x="34" y="174"
          font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Arial"
          font-size="12" fill="#5C6370">TypeScript</text>

    <!-- Separator dots -->
    <circle cx="112" cy="170" r="1.5" fill="#2E3340"/>
    <circle cx="122" cy="170" r="1.5" fill="#2E3340"/>

    <!-- Stars — etched look -->
    <text x="136" y="174"
          font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Arial"
          font-size="11" fill="#4A5060">★</text>
    <text x="150" y="174"
          font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Arial"
          font-size="12" fill="#5C6370">0</text>

    <!-- Forks -->
    <text x="180" y="174"
          font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Arial"
          font-size="11" fill="#4A5060">⑂</text>
    <text x="194" y="174"
          font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Arial"
          font-size="12" fill="#5C6370">0</text>

    <!-- Owner slug — right aligned, very subtle -->
    <text x="522" y="174"
          font-family="ui-monospace,'Cascadia Code','Fira Code',Consolas,monospace"
          font-size="10.5" fill="#2E3340" text-anchor="end"
          letter-spacing="0.02em">RobasAhmedShah/Blocks-App</text>

    <!-- ── Outer border (on top of everything) ── -->
    <rect width="540" height="200" rx="20" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.05"/>
  </g>
</svg>