<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="540" height="200" viewBox="0 0 540 200" role="img" aria-label="Tradeit repository card">
  <defs>
    <!-- ── Physical Lighting & Materials ── -->
    <linearGradient id="metalBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#343842"/>
      <stop offset="100%" stop-color="#21242B"/>
    </linearGradient>

    <linearGradient id="edgeBevel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="30%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Accent piece material (dynamically adapts to language color) -->
    <linearGradient id="accentMetal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#3178C6"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.4"/>
    </linearGradient>

    <linearGradient id="troughBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#121419"/>
      <stop offset="100%" stop-color="#1B1E25"/>
    </linearGradient>

    <linearGradient id="buttonBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A3F4A"/>
      <stop offset="100%" stop-color="#282B33"/>
    </linearGradient>

    <!-- Glass LED -->
    <radialGradient id="glassLED" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#3178C6"/>
      <stop offset="80%" stop-color="#3178C6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </radialGradient>

    <!-- ── Realistic Drop Shadows ── -->
    <filter id="physicalShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000" flood-opacity="0.45"/>
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <filter id="buttonShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.6"/>
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.8"/>
    </filter>

    <!-- Inner shadow/glow for the LED to make it emit light -->
    <filter id="ledGlow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.7"/>
    </filter>

    <clipPath id="cardClip">
      <rect width="540" height="200" rx="20"/>
    </clipPath>
  </defs>

  <!-- ── Base Card Entity ── -->
  <rect width="540" height="200" rx="20" fill="#21242B" filter="url(#physicalShadow)"/>
  
  <g clip-path="url(#cardClip)">
    <rect width="540" height="200" fill="url(#metalBase)"/>

    <!-- 3D Beveled Edge -->
    <rect x="1" y="1" width="538" height="198" rx="19" fill="none" stroke="url(#edgeBevel)" stroke-width="2"/>
    
    <!-- Very soft inner glow to round out the surface -->
    <rect x="2" y="2" width="536" height="196" rx="18" fill="none" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1"/>

    <!-- ══════════════════════════════════════ 
         SECTION 1 — Header (Repo Name & Desc) 
         ══════════════════════════════════════ -->
    <rect x="-2" y="23" width="7" height="38" rx="2" fill="#0A0C0F"/>
    <rect x="0" y="24" width="4" height="36" rx="2" fill="url(#accentMetal)"/>
    <rect x="0" y="24" width="1" height="36" fill="#FFFFFF" opacity="0.6"/>
    <rect x="3" y="24" width="1" height="36" fill="#000000" opacity="0.4"/>

    <!-- Repo Name -->
    <text x="22" y="49" font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Arial" font-size="22" font-weight="800" fill="#000000" opacity="0.8">Tradeit</text>
    <text x="22" y="47" font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Arial" font-size="22" font-weight="800" fill="#FFFFFF" opacity="0.3">Tradeit</text>
    <text x="22" y="48" font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Arial" font-size="22" font-weight="800" fill="#F0F2F5">Tradeit</text>

    <!-- Description -->
    <text x="22" y="69" font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Arial" font-size="13" fill="#FFFFFF" opacity="0.15">No description provided.</text>
    <text x="22" y="68" font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Arial" font-size="13" fill="#8892A3">No description provided.</text>


    <!-- ══════════════════════════════════════ 
         SECTION 2 — Recessed Trough (Commit) 
         ══════════════════════════════════════ -->
    <rect x="18" y="86" width="504" height="62" rx="10" fill="url(#troughBase)"/>

    <path d="M 18 138 L 18 96 C 18 90.5 22.5 86 28 86 L 512 86" fill="none" stroke="#000000" stroke-width="3" opacity="0.7"/>
    <path d="M 18 138 L 18 96 C 18 90.5 22.5 86 28 86 L 512 86" fill="none" stroke="#000000" stroke-width="1" opacity="0.9"/>
    
    <path d="M 18 138 C 18 143.5 22.5 148 28 148 L 512 148 C 517.5 148 522 143.5 522 138 L 522 86" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.15"/>

    <text x="32" y="105" font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Arial" font-size="10" font-weight="700" fill="#000000" opacity="0.8" letter-spacing="0.1em">LAST COMMIT</text>
    <text x="32" y="104" font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Arial" font-size="10" font-weight="700" fill="#5A6375" letter-spacing="0.1em">LAST COMMIT</text>

    
    <!-- Commit "since" pill -->
    <rect x="447" y="91" width="63" height="18" rx="9" fill="#000" filter="url(#buttonShadow)"/>
    <rect x="447" y="91" width="63" height="18" rx="9" fill="url(#buttonBase)"/>
    <rect x="448" y="92" width="61" height="16" rx="8" fill="none" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="1"/>
    <rect x="448" y="92" width="61" height="16" rx="8" fill="none" stroke="#000000" stroke-opacity="0.4" stroke-width="1"/>
    
    <text x="478.5" y="104.5" font-family="ui-monospace,'Cascadia Code','Fira Code',Consolas,monospace" font-size="10" font-weight="600" fill="#000000" text-anchor="middle" opacity="0.7">1d ago</text>
    <text x="478.5" y="103.5" font-family="ui-monospace,'Cascadia Code','Fira Code',Consolas,monospace" font-size="10" font-weight="600" fill="#3178C6" text-anchor="middle">1d ago</text>
    

    <!-- Etched Divider -->
    <rect x="30" y="114" width="480" height="1" fill="#000000" opacity="0.8"/>
    <rect x="30" y="115" width="480" height="1" fill="#FFFFFF" opacity="0.08"/>

    <!-- Commit message -->
    <text x="32" y="134" font-family="ui-monospace,'Cascadia Code','Fira Code',Consolas,monospace" font-size="13" fill="#000000" opacity="0.9">feat: add BrandTyping component for authentication.</text>
    <text x="32" y="133" font-family="ui-monospace,'Cascadia Code','Fira Code',Consolas,monospace" font-size="13" fill="#A8B4C9">feat: add BrandTyping component for authentication.</text>


    <!-- ══════════════════════════════════════ 
         SECTION 3 — Footer Stats Row 
         ══════════════════════════════════════ -->
    <circle cx="26" cy="172" r="5" fill="url(#glassLED)" filter="url(#ledGlow)"/>
    <path d="M 23 169 A 3 3 0 0 1 28 170 A 3.5 3.5 0 0 0 23 169 Z" fill="#FFFFFF" opacity="0.9"/>
    <path d="M 24 175 A 4 4 0 0 0 29 174 A 4.5 4.5 0 0 1 24 175 Z" fill="#FFFFFF" opacity="0.3"/>

    <!-- Footer Text: Debossed (stamped into metal) -->
    <g font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Arial" font-size="12" fill="#FFFFFF" opacity="0.15">
      <text x="38" y="177">TypeScript</text>
      <text x="142" y="177" font-size="11">★</text>
      <text x="156" y="177">0</text>
      <text x="179" y="177" font-size="11">⑂</text>
      <text x="193" y="177">0</text>
    </g>
    
    <g font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Arial" font-size="12" fill="#8892A3">
      <text x="38" y="176">TypeScript</text>
      <text x="142" y="176" font-size="11" fill="#6B7485">★</text>
      <text x="156" y="176">0</text>
      <text x="179" y="176" font-size="11" fill="#6B7485">⑂</text>
      <text x="193" y="176">0</text>
    </g>

    <!-- Physical drilled separator dots -->
    <circle cx="118" cy="172" r="2" fill="#FFFFFF" opacity="0.15"/>
    <circle cx="128" cy="172" r="2" fill="#FFFFFF" opacity="0.15"/>
    <circle cx="118" cy="171" r="2" fill="#0A0C0F"/>
    <circle cx="128" cy="171" r="2" fill="#0A0C0F"/>

    <!-- Owner slug -->
    <text x="522" y="177" font-family="ui-monospace,'Cascadia Code','Fira Code',Consolas,monospace" font-size="11" fill="#FFFFFF" text-anchor="end" opacity="0.1">RobasAhmedShah/Tradeit</text>
    <text x="522" y="176" font-family="ui-monospace,'Cascadia Code','Fira Code',Consolas,monospace" font-size="11" fill="#4B5263" text-anchor="end">RobasAhmedShah/Tradeit</text>
  </g>
</svg>